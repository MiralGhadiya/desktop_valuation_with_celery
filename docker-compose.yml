x-app-environment: &app-environment
  ENV: ${ENV:-production}
  DATABASE_URL: ${DATABASE_URL:-}
  POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  POSTGRES_DB: ${POSTGRES_DB:-desktop_db}
  POSTGRES_USER: ${POSTGRES_USER:-postgres}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
  POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-prefer}
  POSTGRES_CONNECT_TIMEOUT: ${POSTGRES_CONNECT_TIMEOUT:-10}
  DB_POOL_SIZE: ${DB_POOL_SIZE:-2}
  DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-2}
  DB_POOL_RECYCLE: ${DB_POOL_RECYCLE:-1800}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  CELERY_WORKER_CONCURRENCY: ${CELERY_WORKER_CONCURRENCY:-2}
  CELERY_WORKER_PREFETCH_MULTIPLIER: ${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}
  CELERY_WORKER_MAX_TASKS_PER_CHILD: ${CELERY_WORKER_MAX_TASKS_PER_CHILD:-20}
  STARTUP_MAX_RETRIES: ${STARTUP_MAX_RETRIES:-20}
  STARTUP_RETRY_DELAY: ${STARTUP_RETRY_DELAY:-3}

x-app-dependencies: &app-dependencies
  postgres:
    condition: service_healthy
  redis:
    condition: service_healthy

x-app-volumes: &app-volumes
  - generated_reports_data:/app/generated_reports
  - uploads_data:/app/uploads
  - app_logs_data:/app/app/logs
  - celerybeat_data:/app/run

x-app-service: &app-service
  image: desktop-valuation:local
  restart: unless-stopped
  init: true
  env_file:
    - .env
  environment: *app-environment
  depends_on: *app-dependencies
  volumes: *app-volumes

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-desktop_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-desktop_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    <<: *app-service
    build:
      context: .
      dockerfile: Dockerfile
    ports:
    - "8000:8000"
    command: ["./start.sh", "api"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

  celery_worker:
    <<: *app-service
    command: ["./start.sh", "worker"]

  celery_beat:
    <<: *app-service
    command: ["./start.sh", "beat"]

  # nginx:
  #   image: nginx:1.27-alpine
  #   restart: unless-stopped
  #   ports:
  #     - "${NGINX_PORT:-8080}:80"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     api:
  #       condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  generated_reports_data:
  uploads_data:
  app_logs_data:
  celerybeat_data:
