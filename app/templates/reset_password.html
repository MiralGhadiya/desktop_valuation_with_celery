<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Reset Password</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      margin: 0;
      height: 100vh;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .box {
      width: 100%;
      max-width: 420px;
      padding: 30px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      background: #ffffff;
    }

    h3 {
      margin-bottom: 20px;
      color: #222;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 14px;
      border-radius: 5px;
      border: 1px solid #6b7cff;
      background-color: #f3f6ff;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border-color: #4c5cff;
      background-color: #e9edff;
    }

    button {
      padding: 8px 16px;
      background: #6b7cff;
      border: none;
      color: #fff;
      border-radius: 5px;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      background: #5a6cf0;
    }

    #msg {
      margin-top: 12px;
      font-size: 14px;
    }

    .success {
      color: #2f855a;
    }

    .error {
      color: #c53030;
    }
  </style>
</head>

<body>
  <div class="box">
    <h3>Reset Password</h3>

    <input type="password" id="new" placeholder="New password" />
    <input type="password" id="confirm" placeholder="Confirm password" />

    <button onclick="reset()">Reset</button>

    <p id="msg"></p>
  </div>

  <script>
    const token = new URLSearchParams(window.location.search).get("token");

    async function reset() {
      const new_password = document.getElementById("new").value;
      const confirm_password = document.getElementById("confirm").value;
      const msg = document.getElementById("msg");

      msg.textContent = "";
      msg.className = "";

      const res = await fetch("http://localhost:8000/reset-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token, new_password, confirm_password })
      });

      const data = await res.json();
      msg.textContent = data.message || data.detail;
      msg.className = res.ok ? "success" : "error";
    }
  </script>
</body>
</html>
