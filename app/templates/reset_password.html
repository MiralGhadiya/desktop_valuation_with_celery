<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password – Desktop Valuation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --forest:     #0D2B23;
      --forest-mid: #1A4035;
      --sage:       #3D7A65;
      --mint-light: #e8f3ee;
      --cream:      #f0f4f2;
      --warm-white: #FDFCF9;
      --text-dark:  #0D1C17;
      --text-muted: #6B8F82;
      --error:      #C0392B;
      --error-bg:   #FDF1F0;
      --error-bdr:  #EDCBC7;
      --success:    #2D7A5E;
      --success-bg: #EBF6F1;
      --success-bdr:#B8E0CE;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      overflow-x: hidden;
    }

    /* Background pattern matching site */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 600px 400px at 80% 10%, rgba(61,122,101,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 400px 400px at 10% 90%, rgba(13,43,35,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── NAVBAR ── */
    nav {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 18px 24px;
      position: relative;
      z-index: 10;
    }

    .nav-inner {
      width: 100%;
      max-width: 1100px;
      background: white;
      border-radius: 16px;
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 16px rgba(13,43,35,0.08);
      border: 1px solid rgba(168,213,194,0.25);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 40px; height: 40px;
      background: var(--forest);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }

    .logo-icon svg { width: 22px; height: 22px; fill: white; }

    .logo-text {
      display: flex;
      flex-direction: column;
      line-height: 1.1;
    }

    .logo-text span:first-child {
      font-family: 'DM Serif Display', serif;
      font-size: 15px;
      color: var(--forest);
    }

    .logo-text span:last-child {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 500;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 32px;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      font-size: 14px;
      color: var(--text-dark);
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--sage); }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .nav-actions .login {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-dark);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-actions .login:hover { color: var(--sage); }

    .nav-actions .cta {
      padding: 10px 22px;
      background: var(--forest);
      color: white;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
      box-shadow: 0 2px 10px rgba(13,43,35,0.25);
    }

    .nav-actions .cta:hover {
      background: var(--forest-mid);
      transform: translateY(-1px);
    }

    /* ── MAIN CONTENT ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px 60px;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    /* Faint building grid in background like the site */
    .bg-grid {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 55%;
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 6px;
      padding: 0 40px;
      opacity: 0.045;
      pointer-events: none;
      z-index: 0;
    }

    .bg-grid-col {
      background: var(--forest);
      border-radius: 4px 4px 0 0;
    }

    .bg-grid-col:nth-child(1) { height: 60%; align-self: end; }
    .bg-grid-col:nth-child(2) { height: 80%; align-self: end; }
    .bg-grid-col:nth-child(3) { height: 45%; align-self: end; }
    .bg-grid-col:nth-child(4) { height: 90%; align-self: end; }
    .bg-grid-col:nth-child(5) { height: 65%; align-self: end; }
    .bg-grid-col:nth-child(6) { height: 75%; align-self: end; }
    .bg-grid-col:nth-child(7) { height: 50%; align-self: end; }
    .bg-grid-col:nth-child(8) { height: 85%; align-self: end; }

    /* ── CARD ── */
    .card {
      background: white;
      border-radius: 24px;
      padding: 52px 48px 44px;
      width: 100%;
      max-width: 480px;
      box-shadow:
        0 1px 3px rgba(13,43,35,0.04),
        0 8px 32px rgba(13,43,35,0.08),
        0 32px 80px rgba(13,43,35,0.06);
      border: 1px solid rgba(168,213,194,0.2);
      animation: cardIn 0.5s cubic-bezier(0.22,1,0.36,1) forwards;
      opacity: 0;
      transform: translateY(16px);
    }

    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      margin-bottom: 32px;
    }

    .card-header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 30px;
      color: var(--text-dark);
      letter-spacing: -0.3px;
      margin-bottom: 8px;
    }

    .card-header p {
      font-size: 14.5px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    /* ── FIELDS ── */
    .field {
      margin-bottom: 16px;
      position: relative;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--forest-mid);
      margin-bottom: 7px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap svg.field-icon {
      position: absolute;
      left: 15px; top: 50%;
      transform: translateY(-50%);
      width: 17px; height: 17px;
      stroke: var(--text-muted);
      fill: none; stroke-width: 1.7;
      pointer-events: none;
      transition: stroke 0.2s;
    }

    .input-wrap input {
      width: 100%;
      padding: 13px 46px 13px 44px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14.5px;
      color: var(--text-dark);
      background: var(--mint-light);
      border: 1.5px solid #D0E8DF;
      border-radius: 12px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .input-wrap input::placeholder { color: #AABFB8; }

    .input-wrap input:focus {
      border-color: var(--sage);
      background: white;
      box-shadow: 0 0 0 4px rgba(61,122,101,0.1);
    }

    .input-wrap:focus-within svg.field-icon { stroke: var(--sage); }

    /* Toggle password visibility */
    .toggle-pw {
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px;
      color: var(--text-muted);
      display: flex; align-items: center;
      transition: color 0.2s;
      width: auto;
    }

    .toggle-pw:hover { color: var(--sage); }
    .toggle-pw svg { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 1.7; }

    /* Password strength */
    .strength-wrap {
      margin-top: 8px;
      display: none;
    }

    .strength-wrap.visible { display: block; }

    .strength-bars {
      display: flex;
      gap: 4px;
      margin-bottom: 5px;
    }

    .strength-bar {
      height: 3px;
      flex: 1;
      border-radius: 99px;
      background: #E0EAE6;
      transition: background 0.3s;
    }

    .strength-bar.weak   { background: #E74C3C; }
    .strength-bar.fair   { background: #F39C12; }
    .strength-bar.good   { background: #27AE60; }
    .strength-bar.strong { background: #1A7A4C; }

    .strength-label {
      font-size: 11.5px;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* ── SUBMIT BUTTON ── */
    .btn-submit {
      width: 100%;
      padding: 15px;
      margin-top: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, var(--forest) 0%, var(--forest-mid) 100%);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(13,43,35,0.25);
      letter-spacing: 0.01em;
    }

    .btn-submit::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.07), transparent);
    }

    .btn-submit:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(13,43,35,0.3);
    }

    .btn-submit:active:not(:disabled) { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

    .btn-inner {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      position: relative; z-index: 1;
    }

    .btn-inner svg { width: 16px; height: 16px; stroke: white; fill: none; stroke-width: 2; transition: transform 0.2s; }
    .btn-submit:hover:not(:disabled) .btn-inner svg { transform: translateX(3px); }

    .spinner {
      width: 17px; height: 17px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-submit.loading .spinner { display: block; }
    .btn-submit.loading .btn-text,
    .btn-submit.loading .btn-icon { display: none; }

    /* ── MESSAGE ── */
    #msg {
      margin-top: 16px;
      padding: 13px 16px;
      border-radius: 10px;
      font-size: 13.5px;
      font-weight: 500;
      display: none;
      align-items: center;
      gap: 9px;
    }

    #msg.success,
    #msg.error { display: flex; animation: msgIn 0.3s ease; }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(-5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #msg.success { background: var(--success-bg); color: var(--success); border: 1px solid var(--success-bdr); }
    #msg.error   { background: var(--error-bg);   color: var(--error);   border: 1px solid var(--error-bdr); }
    #msg svg { width: 16px; height: 16px; flex-shrink: 0; fill: none; stroke: currentColor; stroke-width: 2; }

    /* ── FOOTER LINK ── */
    .back-link {
      margin-top: 22px;
      text-align: center;
      font-size: 13.5px;
      color: var(--text-muted);
    }

    .back-link a {
      color: var(--sage);
      font-weight: 500;
      text-decoration: none;
    }

    .back-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <!-- Background building grid -->
  <div class="bg-grid" aria-hidden="true">
    <div class="bg-grid-col"></div>
    <div class="bg-grid-col"></div>
    <div class="bg-grid-col"></div>
    <div class="bg-grid-col"></div>
    <div class="bg-grid-col"></div>
    <div class="bg-grid-col"></div>
    <div class="bg-grid-col"></div>
    <div class="bg-grid-col"></div>
  </div>

  <!-- Main card -->
  <main>
    <div class="card">
      <div class="card-header">
        <h1>Reset Password</h1>
        <p>Choose a new strong password for your account.</p>
      </div>

      <!-- New Password -->
      <div class="field">
        <label for="new">New Password</label>
        <div class="input-wrap">
          <svg class="field-icon" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          <input type="password" id="new" placeholder="Enter new password" oninput="checkStrength(this.value)" />
          <button type="button" class="toggle-pw" onclick="togglePw('new', this)" aria-label="Show password">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" class="eye-icon">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="strength-wrap" id="strengthWrap">
          <div class="strength-bars">
            <div class="strength-bar" id="bar1"></div>
            <div class="strength-bar" id="bar2"></div>
            <div class="strength-bar" id="bar3"></div>
            <div class="strength-bar" id="bar4"></div>
          </div>
          <span class="strength-label" id="strengthLabel"></span>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="field">
        <label for="confirm">Confirm Password</label>
        <div class="input-wrap">
          <svg class="field-icon" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          <input type="password" id="confirm" placeholder="Confirm new password" />
          <button type="button" class="toggle-pw" onclick="togglePw('confirm', this)" aria-label="Show password">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" class="eye-icon">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Submit -->
      <button class="btn-submit" id="submitBtn" onclick="reset()">
        <span class="btn-inner">
          <span class="btn-text">Reset Password</span>
          <svg class="btn-icon" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
          <div class="spinner"></div>
        </span>
      </button>

      <!-- Message -->
      <div id="msg">
        <svg id="msgIcon" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"></svg>
        <span id="msgText"></span>
      </div>
    </div>
  </main>

  <script>
    const token = new URLSearchParams(window.location.search).get("token");

    function togglePw(id, btn) {
      const input = document.getElementById(id);
      const isText = input.type === 'text';
      input.type = isText ? 'password' : 'text';
      btn.querySelector('svg').innerHTML = isText
        ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
        : '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
    }

    function checkStrength(val) {
      const wrap = document.getElementById('strengthWrap');
      const label = document.getElementById('strengthLabel');
      const bars = [1,2,3,4].map(i => document.getElementById('bar' + i));

      if (!val) { wrap.classList.remove('visible'); return; }
      wrap.classList.add('visible');

      let score = 0;
      if (val.length >= 8)  score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      const levels = ['', 'weak', 'fair', 'good', 'strong'];
      const labels = ['', 'Weak', 'Fair', 'Good', 'Strong'];

      bars.forEach((b, i) => {
        b.className = 'strength-bar';
        if (i < score) b.classList.add(levels[score]);
      });

      label.textContent = labels[score] + (score < 3 ? ' — add numbers, symbols or uppercase' : '');
    }

    async function reset() {
      const newPw  = document.getElementById('new').value;
      const confPw = document.getElementById('confirm').value;
      const btn    = document.getElementById('submitBtn');
      const msg    = document.getElementById('msg');

      msg.className = '';
      if (!newPw || !confPw) { showMsg('error', 'Please fill in both fields.'); return; }
      if (newPw !== confPw)  { showMsg('error', 'Passwords do not match.'); return; }

      btn.classList.add('loading');
      btn.disabled = true;

      try {
        const res = await fetch('/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, new_password: newPw, confirm_password: confPw })
        });

        const data = await res.json();
        showMsg(res.ok ? 'success' : 'error', data.message || data.detail || 'Something went wrong.');
      } catch {
        showMsg('error', 'Connection failed. Please try again.');
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }

    function showMsg(type, text) {
      const msg  = document.getElementById('msg');
      const icon = document.getElementById('msgIcon');
      document.getElementById('msgText').textContent = text;
      msg.className = type;
      icon.innerHTML = type === 'success'
        ? '<path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>'
        : '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>';
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') reset(); });
  </script>
</body>
</html>
